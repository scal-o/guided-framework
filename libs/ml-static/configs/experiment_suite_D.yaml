# # Example experiment suite for batch training
# # This file defines multiple experiments that will be run sequentially
# # Each experiment updates conf_run.yaml before training, then restores it afterward

experiments:
  #### Experiment D: Inter-Network Transfer Learning & Layer Sensitivity Analysis =========================================
  ## list of experiments for each model / dataset combination

  ## On Dataset A (LM): 
  ## - zero-shot
  ## - preprocessing layers
  ## - predictor head
  ## - preprocessing layers + predictor head
  ## - last r-encoder layers + predictor head
  ## - last v-encoder layers + predictor head
  ## - preprocessing layers, last r-encoder layers, predictor head
  ## - preprocessing layers, last v-encoder layers, predictor head
  ## - last v-encoder layers, last r-encoder layers, predictor head
  ## - preprocessing layers, last v-encoder layers, last r-encoder layers, predictor head
  ## - full model

  ## On Dataset B (dirichlet): 
  ## - zero-shot 
  ## - preprocessing layers
  ## - predictor head
  ## - preprocessing layers + predictor head
  ## - last r-encoder layers + predictor head
  ## - last v-encoder layers + predictor head
  ## - preprocessing layers, last r-encoder layers, predictor head
  ## - preprocessing layers, last v-encoder layers, predictor head
  ## - last v-encoder layers, last r-encoder layers, predictor head 
  ## - preprocessing layers, last v-encoder layers, last r-encoder layers, predictor head 
  ## - full model 

  ## === Anaheim to Chicago - Dataset A === ##

