  - name: "baseline an_to_ch A: preprocessing layers"
    template: finetune
    updates:
      config:
          model.name: preproc_padded
          dataset.max_nodes: 950
          dataset.name: chicago_a_small
          training.init.run_id: "preproc_padded on anaheim_a (run)"
          training.freeze.enabled: true
          training.freeze.exclude:
              - encoders
              - predictor
  
  - name: "baseline an_to_ch A: predictor head"
    template: finetune
    updates:
      config:
