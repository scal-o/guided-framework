# # Example experiment suite for batch training
# # This file defines multiple experiments that will be run sequentially
# # Each experiment updates conf_run.yaml before training, then restores it afterward

experiments:
  #### Experiment A: Training on full dataset ==================================

  ## === Anaheim === ##
  # baseline model
  - name: anaheim_base_lm
    template: run
    updates:
      config: 
        model.name: preproc_padded
        dataset.name: anaheim_a
        dataset.max_nodes: 950

  - name: anaheim_base_dirich
    template: run
    updates:
      config: 
        model.name: preproc_padded
        dataset.name: anaheim_b
        dataset.max_nodes: 950

  # linear init
  - name: anaheim_linear_init
    template: run
    updates:
      config: 
        model.name: linear_init
        dataset.name: anaheim_a

  - name: anaheim_linear_init_dirich
    template: run
    updates:
      config: 
        model.name: linear_init
        dataset.name: anaheim_b  

  # rbf init
  - name: anaheim_rbf_init
    template: run
    updates:
      config: 
        model.name: rbf_init
        dataset.name: anaheim_a

  - name: anaheim_rbf_init_dirich
    template: run
    updates:
      config: 
        model.name: rbf_init
        dataset.name: anaheim_b

  ## === Chicago === ##
  # baseline model
  - name: chicago_base_lm
    template: run
    updates:
      config: 
        model.name: preproc_padded
        dataset.name: chicago_a
        dataset.max_nodes: 950

  - name: chicago_base_dirich
    template: run
    updates:
      config: 
        model.name: preproc_padded
        dataset.name: chicago_b
        dataset.max_nodes: 950

  # linear init
  - name: chicago_linear_init
    template: run
    updates:
      config: 
        model.name: linear_init
        dataset.name: chicago_a

  - name: chicago_linear_init_dirich
    template: run
    updates:
      config: 
        model.name: linear_init
        dataset.name: chicago_b  

  # rbf init
  - name: chicago_rbf_init
    template: run
    updates:
      config: 
        model.name: rbf_init
        dataset.name: chicago_a

  - name: chicago_rbf_init_dirich
    template: run
    updates:
      config: 
        model.name: rbf_init
        dataset.name: chicago_b
